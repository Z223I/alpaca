# =============================================================
# Ansible inventory for apache-web VM provisioning
#
# Usage:
#   1. Run the playbook first with only [kvm_host] populated.
#      The playbook will discover the VM IP and write it here
#      automatically via the 'update_inventory' task.
#   2. On re-runs the [apache_vm] group is already populated.
# =============================================================

[kvm_host]
localhost ansible_connection=local

# Populated automatically after the VM boots and gets a DHCP IP.
# You can also set it manually:
#   apache-web-test ansible_host=192.168.122.X ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519
[apache_vm]
apache-web-test ansible_host=192.168.122.33 ansible_user=ubuntu ansible_ssh_private_key_file=/home/wilsonb/.ssh/id_ed25519

[apache_vm:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
